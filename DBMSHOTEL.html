<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RoomFlow – Hotel Booking Interface</title>

<style>
  *{box-sizing:border-box;font-family:system-ui,-apple-system}
  body{
    margin:0;
    min-height:100vh;
    background:linear-gradient(120deg,#667eea,#764ba2,#43cea2);
    background-size:300% 300%;
    animation:bgMove 12s ease infinite;
    color:#1f2937;
  }

  @keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  /* ===== LOGIN ===== */
  #loginScreen{
    position:fixed;
    inset:0;
    display:flex;
  }
  .login-left{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(10px);
  }
  .login-box{
    width:420px;
    background:rgba(255,255,255,.9);
    padding:50px;
    border-radius:22px;
    box-shadow:0 30px 60px rgba(0,0,0,.35);
  }
  .login-box h1{
    margin:0;
    background:linear-gradient(90deg,#4f46e5,#06b6d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .login-box p{
    color:#6b7280;
    margin:12px 0 30px;
  }
  .login-box input{
    width:100%;
    padding:16px;
    border-radius:14px;
    border:1px solid #d1d5db;
    margin-bottom:20px;
  }
  .login-box button{
    width:100%;
    padding:16px;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:#fff;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:15px;
  }

  /* LOGIN IMAGE */
  .login-right{
    flex:1;
    background:url("https://images.unsplash.com/photo-1566073771259-6a8506099945")
    center/cover no-repeat;
  }

  /* ===== APP ===== */
  #app{display:none}

  /* ===== HEADER ===== */
  header{
    padding:25px 60px;
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,.4);
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  header h2{
    margin:0;
    background:linear-gradient(90deg,#4f46e5,#06b6d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  header span{
    color:#475569;
  }

  /* ===== TABS ===== */
  .tabs{
    display:flex;
    gap:35px;
    padding:20px 60px;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(10px);
  }
  .tabs button{
    background:none;
    border:none;
    font-size:15px;
    cursor:pointer;
    color:#475569;
  }
  .tabs button.active{
    font-weight:600;
    background:linear-gradient(90deg,#4f46e5,#06b6d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    border-bottom:3px solid #06b6d4;
    padding-bottom:6px;
  }

  /* ===== MAIN LAYOUT ===== */
  .main{
    display:flex;
    min-height:calc(100vh - 150px);
  }
  .content{
    flex:1;
    padding:60px;
  }
  .visual{
    width:40%;
    position:relative;
  }
  .visual img{
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .visual::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.6));
  }

  /* ===== SECTIONS ===== */
  section{
    display:none;
    max-width:900px;
    background:rgba(255,255,255,.85);
    backdrop-filter:blur(14px);
    padding:45px;
    border-radius:26px;
    box-shadow:0 25px 45px rgba(0,0,0,.2);
  }
  section.active{display:block}

  h3{
    margin-top:0;
    background:linear-gradient(90deg,#4f46e5,#06b6d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  p{color:#6b7280}

  /* ===== FORMS ===== */
  .form-group{margin-bottom:22px}
  label{
    display:block;
    font-size:13px;
    margin-bottom:6px;
    color:#475569;
  }
  input, select{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:1px solid #cbd5e1;
    background:#ffffff;
    font-size:15px;
    appearance:auto;
    -webkit-appearance:menulist;
    -moz-appearance:menulist;
    position:relative;
    z-index:10;
  }

  .action{
    margin-top:15px;
    padding:14px 32px;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:#fff;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:15px;
  }

  /* ===== LISTS ===== */
  .list{
    margin-top:25px;
    background:rgba(255,255,255,.95);
    border-radius:18px;
    overflow:hidden;
  }
  .item{
    padding:18px 22px;
    border-bottom:1px solid #e5e7eb;
  }
  .item:last-child{border-bottom:none}
  .item span{
    color:#6b7280;
    font-size:14px;
  }
  .delete-btn{
    background:#ef4444;
    color:#fff;
    border:none;
    padding:8px 16px;
    border-radius:20px;
    cursor:pointer;
    font-size:13px;
  }
  .delete-btn:hover{
    opacity:0.9;
  }
  .item-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

</style>
</head>

<body>

<div id="loginScreen">
  <div class="login-left">
    <div class="login-box">
      <h1>RoomFlow</h1>
      <p>Colorful hotel room & booking experience</p>
      <input id="adminName" placeholder="Admin name">
      <button onclick="handleLogin()">Enter</button>
    </div>
  </div>
  <div class="login-right"></div>
</div>

<div id="app">

  <header>
    <h2>RoomFlow</h2>
    <span id="adminInfo"></span>
  </header>

  <div class="tabs">
    <button class="active" onclick="show('home',this)">Overview</button>
    <button onclick="show('rooms',this)">Rooms</button>
    <button onclick="show('book',this)">Bookings</button>
    <button onclick="show('records',this)">Records</button>
  </div>

  <div class="main">
    <div class="content">

      <section id="home" class="active">
        <h3>Welcome</h3>
        <p>Manage hotel rooms and bookings in a vibrant, modern interface.</p>
      </section>

      <section id="rooms">
        <h3>Add Room</h3>
        <div class="form-group">
          <label>Room Number</label>
          <input id="roomNo">
        </div>
        <div class="form-group">
          <label>Room Type</label>
          <select id="roomType">
            <option>Single</option>
            <option>Double</option>
            <option>Deluxe</option>
            <option>Suite</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price per Night</label>
          <input id="roomPrice" readonly>
        </div>
        <button class="action" onclick="addRoom()">Save Room</button>
      </section>

      <section id="book">
        <h3>Create Booking</h3>
        <div class="form-group">
          <label>Customer Name</label>
          <input id="custName">
        </div>
        <div class="form-group">
          <label>Select Room</label>
          <select id="roomSelect"></select>
        </div>
        <div class="form-group">
          <label>Check In</label>
          <input type="date" id="checkIn">
        </div>
        <div class="form-group">
          <label>Check Out</label>
          <input type="date" id="checkOut">
        </div>
        <div class="form-group">
        <label>Booking Mode</label>
        <select id="mode">
        <option value="Online">Online (Website Booking)</option>
        <option value="Offline">Offline (Walk-in Customer)</option>
  </select>
</div>
        <button class="action" onclick="bookRoom()">Confirm Booking</button>
      </section>

      <section id="records">
        <h3>Rooms</h3>
        <div id="roomList" class="list"></div>

        <h3 style="margin-top:40px">Bookings</h3>
        <div id="bookingList" class="list"></div>
      </section>

    </div>

    <div class="visual">
      <img id="visualImg"
        src="https://images.unsplash.com/photo-1501117716987-c8e1ecb210d0">
    </div>
  </div>

</div>

<script>
  let rooms = JSON.parse(localStorage.getItem("rooms")) || [];
  const priceMap = {
    Single: 1000,
    Double: 2000,
    Deluxe: 3500,
    Suite: 7000
  };

  const roomTypeEl = document.getElementById("roomType");
  const roomPriceEl = document.getElementById("roomPrice");

  // Initialize price on load for the default selected option
  roomPriceEl.value = priceMap[roomTypeEl.value] || "";

  roomTypeEl.addEventListener("change", () => {
    roomPriceEl.value = priceMap[roomTypeEl.value] || "";
  });

  let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

  const images={
    home:"https://images.unsplash.com/photo-1501117716987-c8e1ecb210d0",
    rooms:"https://images.unsplash.com/photo-1560448204-e02f11c3d0e2",
    book:"https://images.unsplash.com/photo-1551882547-ff40c63fe5fa",
    records:"https://images.unsplash.com/photo-1566073771259-6a8506099945"
  };

  const adminName = document.getElementById("adminName");
  const loginScreen = document.getElementById("loginScreen");
  const app = document.getElementById("app");
  const adminInfo = document.getElementById("adminInfo");
  const visualImg = document.getElementById("visualImg");

  // Room inputs
  const roomNo = document.getElementById("roomNo");

  // Booking inputs
  const custName = document.getElementById("custName");
  const checkIn = document.getElementById("checkIn");
  const checkOut = document.getElementById("checkOut");

  function handleLogin(){
    if(!adminName.value) return alert("Enter admin name");
    loginScreen.style.display="none";
    app.style.display="block";
    adminInfo.innerText="Admin: "+adminName.value;
    loadRooms();
  }

  function show(id, btn){
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");

    visualImg.src = images[id];

    if(id === "book"){
      loadRooms(); // Refresh dropdown when clicking Book tab
    }

    if(id === "records"){
      render();
    }
  }

async function addRoom(){
  if(!roomNo.value || !roomTypeEl.value){
    alert("Fill room details");
    return;
  }

  const response = await fetch("http://127.0.0.1:5000/add_room",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      room_no:roomNo.value,
      room_type:roomTypeEl.value
    })
  });

  const data = await response.json();
  alert(data.status || data.error);

  roomNo.value="";
}
  
async function bookRoom(){

  const room = document.getElementById("roomSelect").value;
  const mode = document.getElementById("mode").value;

  if(!custName.value || !checkIn.value || !checkOut.value || !room){
    alert("Fill all details");
    return;
  }

  let phone = "N/A";
  let aadhar = "N/A";

  // Only ask Aadhar if Online booking
  if(mode === "Online"){
    phone = prompt("Enter Phone Number:");
    aadhar = prompt("Enter Aadhar Number:");
  }

  const response = await fetch("http://127.0.0.1:5000/book_room",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      name:custName.value,
      phone:phone,
      aadhar:aadhar,
      room_no:room,
      checkin:checkIn.value,
      checkout:checkOut.value,
      mode:mode
    })
  });

  const data = await response.json();
  alert(data.status);
}
  async function render(){

  const roomList = document.getElementById("roomList");
  const bookingList = document.getElementById("bookingList");

  roomList.innerHTML = "";
  bookingList.innerHTML = "";

  // Fetch rooms
  const roomsRes = await fetch("http://127.0.0.1:5000/get_rooms");
  const rooms = await roomsRes.json();

  if(rooms.length === 0){
    roomList.innerHTML = "<p style='padding:15px'>No rooms available</p>";
  } else {
    rooms.forEach(r=>{
      roomList.innerHTML += `
        <div class="item">
          <strong>Room ${r[0]}</strong>
          <span>${r[1]} • ₹${r[2]}</span>
        </div>
      `;
    });
  }

  // Fetch bookings
  const bookingRes = await fetch("http://127.0.0.1:5000/get_bookings");
  const bookings = await bookingRes.json();

  if(bookings.length === 0){
    bookingList.innerHTML = "<p style='padding:15px'>No bookings found</p>";
  } else {
    bookings.forEach(b=>{
      bookingList.innerHTML += `
        <div class="item">
          <strong>${b[1]}</strong>
          <span>Room ${b[2]} • ${b[3]} → ${b[4]} • ${b[5]}</span>
        </div>
      `;
    });
  }
}

  function deleteRoom(index){
    if(!confirm("Are you sure you want to delete this room?")) return;

    rooms.splice(index,1);
    localStorage.setItem("rooms",JSON.stringify(rooms));

    // Update dropdown
    loadRooms();
    render();
  }

  function deleteBooking(index){
    if(!confirm("Are you sure you want to delete this booking?")) return;

    bookings.splice(index,1);
    localStorage.setItem("bookings",JSON.stringify(bookings));

    render();
  }
  async function checkAvailableRooms(){

  if(!checkIn.value || !checkOut.value) return;

  const res = await fetch(`http://127.0.0.1:5000/available/${checkIn.value}/${checkOut.value}`);
  const data = await res.json();

  const dropdown = document.getElementById("roomSelect");
  dropdown.innerHTML = "<option>Select Room</option>";

  data.forEach(r=>{
    const opt = document.createElement("option");
    opt.value = r[0];
    opt.textContent = "Room " + r[0];
    dropdown.appendChild(opt);
  });
}

checkIn.addEventListener("change", checkAvailableRooms);
checkOut.addEventListener("change", checkAvailableRooms);

checkIn.addEventListener("change",checkAvailableRooms);
checkOut.addEventListener("change",checkAvailableRooms);
</script>
</body>
</html>
